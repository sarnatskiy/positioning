<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Практика позиционирования</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    
    <div class="container">
        <div class="logo target">
            <div class="target-middle">
                <div class="target-inner"></div>
            </div>
        </div>

        <div class="logo microsoft">
            <div class="square red"></div>
            <div class="square green"></div>
            <div class="square blue"></div>
            <div class="square yellow"></div>
        </div>
    </div>

    <button id="openModal">Открыть модальное окно</button>

    <div class="overlay" id="overlay">
        <div class="modal">
            <button class="close-cross" id="closeCross">&times;</button>
            <div class="modal-content">
                <h2>Контент окна (67)</h2>
                <p>Ширина этого окна фиксирована (640px), а высота адаптируется под содержимое.</p>
            </div>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
